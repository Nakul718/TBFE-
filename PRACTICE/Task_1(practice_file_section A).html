
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display an Image with Caption</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      text-align: center;
    }

    img {
      width: 300px;
      display: block;
      margin: 0 auto;
    }

    p {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>My Favorite Place</h2>
  <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80" alt="A beautiful beach" />
  <p>I love this place because it feels calm, peaceful, and refreshing whenever I need a break.</p>
</body>
</html>
